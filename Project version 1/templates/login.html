<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Voting - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; padding: 40px 20px; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .admin-corner {
            position: fixed; top: 16px; right: 16px;
            padding: 7px 14px; background: #f3f4f6;
            border: 1px solid #d1d5db; border-radius: 8px;
            font-size: 12px; font-weight: 600; color: #6b7280;
            text-decoration: none; transition: all 0.2s;
        }
        .admin-corner:hover { background: #e5e7eb; color: #374151; }
        .container {
            max-width: 400px; width: 100%;
            background: white; border-radius: 20px; padding: 40px 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1); position: relative;
        }
        .back-btn { position: absolute; top: 24px; left: 24px; color: #4f46e5; text-decoration: none; font-size: 14px; font-weight: 500; }
        .back-btn::before { content: "←"; margin-right: 6px; }
        .icon-circle {
            width: 64px; height: 64px; border-radius: 50%; background: #4f46e5;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px; font-size: 30px;
        }
        h1 { font-size: 26px; font-weight: 700; text-align: center; margin-bottom: 6px; color: #111827; }
        .subtitle { font-size: 15px; color: #6b7280; text-align: center; margin-bottom: 28px; }
        .flash-error { color: #ef4444; font-size: 13px; margin-bottom: 16px; background: #fef2f2; padding: 10px 14px; border-radius: 8px; border: 1px solid #fecaca; }
        .flash-info { color: #0369a1; font-size: 13px; margin-bottom: 16px; background: #e0f2fe; padding: 10px 14px; border-radius: 8px; border: 1px solid #bae6fd; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
        input {
            width: 100%; padding: 11px 14px;
            border: 1px solid #d1d5db; border-radius: 10px;
            font-size: 15px; background: #fafbfc;
            transition: border-color 0.2s; font-family: 'Inter', sans-serif;
        }
        input:focus { outline: none; border-color: #4f46e5; background: white; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
        .btn {
            width: 100%; padding: 13px; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            background: #4f46e5; color: white;
            margin-bottom: 18px; transition: all 0.2s; font-family: 'Inter', sans-serif;
        }
        .btn:hover { background: #3730a3; transform: translateY(-1px); box-shadow: 0 6px 16px rgba(79,70,229,0.3); }
        .register-link { text-align: center; font-size: 14px; color: #10b981; text-decoration: none; display: block; }
        .register-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <a href="/admin_login" class="admin-corner" style="display:inline-flex;align-items:center;gap:5px;"><img src="https://cdn-icons-png.flaticon.com/512/2889/2889676.png" style="width:14px;height:14px;" alt="admin"> Admin Login</a>

    <div class="container">
        <a href="/" class="back-btn">Back to Home</a>
        <div class="icon-circle"><img src="https://cdn-icons-png.flaticon.com/512/3064/3064155.png" style="width:34px;height:34px;" alt="key"></div>
        <h1>Login</h1>
        <p class="subtitle">Sign in to cast your vote</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="{% if 'OTP' in messages[0] %}flash-info{% else %}flash-error{% endif %}">
                    {{ messages[0] }}
                </div>
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label>Aadhar Number</label>
                <input type="text" name="aadhar" placeholder="1234 5678 9012" maxlength="14" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn" style="display:inline-flex;align-items:center;justify-content:center;gap:8px;"><img src="https://cdn-icons-png.flaticon.com/512/3064/3064155.png" style="width:18px;height:18px;" alt="otp"> Send OTP</button>
        </form>

        <a href="{{ url_for('register') }}" class="register-link">Don't have an account? Register here</a>
    </div>
</body>
</html>
