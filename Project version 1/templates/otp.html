<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Voting - OTP Verification</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .container {
            max-width: 400px; width: 100%;
            background: white;
            border-radius: 20px;
            padding: 40px 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            text-align: center;
        }
        .icon-circle {
            width: 72px; height: 72px; border-radius: 50%;
            background: #10b981;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; font-size: 32px;
        }
        h1 { font-size: 26px; font-weight: 700; color: #111827; margin-bottom: 8px; }
        .subtitle { font-size: 15px; color: #6b7280; margin-bottom: 32px; }
        .flash-msg { color: #059669; font-size: 13px; margin-bottom: 16px; background: #f0fdf4; padding: 10px 14px; border-radius: 8px; border: 1px solid #bbf7d0; }
        .otp-inputs {
            display: flex; gap: 10px; justify-content: center; margin-bottom: 28px;
        }
        .otp-input {
            width: 48px; height: 52px;
            font-size: 20px; font-weight: 700; text-align: center;
            border: 2px solid #d1d5db; border-radius: 10px;
            transition: border-color 0.2s;
        }
        .otp-input:focus { outline: none; border-color: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,0.15); }
        input[name="otp"] { display: none; }
        .btn {
            width: 100%; padding: 14px; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .btn-success { background: #10b981; color: white; }
        .btn-success:hover { background: #059669; transform: translateY(-1px); }
        .error-msg { color: #ef4444; font-size: 13px; margin-bottom: 12px; background: #fef2f2; padding: 10px 14px; border-radius: 8px; border: 1px solid #fecaca; }
        .back-link { display: block; margin-top: 20px; font-size: 14px; color: #6b7280; text-decoration: none; }
        .back-link:hover { color: #111827; }
    </style>
</head>
<body>
<div class="container">
    <div class="icon-circle">🔐</div>
    <h1>OTP Verification</h1>
    <p class="subtitle">Enter the 6-digit code sent to your registered mobile</p>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="{% if 'Invalid' in messages[0] or 'expired' in messages[0] %}error-msg{% else %}flash-msg{% endif %}">
                {{ messages[0] }}
            </div>
        {% endif %}
    {% endwith %}

    <form method="POST" action="{{ '/verify_login_otp' if mode == 'login' else '/verify_otp' }}" id="otpForm">
        <div class="otp-inputs">
            <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
            <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
            <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
            <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
            <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
            <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
        </div>
        <!-- Hidden input that gets combined value -->
        <input type="text" name="otp" id="otpHidden">
        <button type="submit" class="btn btn-success" id="verifyBtn">Verify & Continue</button>
    </form>

    <a href="{{ url_for('login') if mode == 'login' else url_for('register') }}" class="back-link">← Go back and resend OTP</a>
</div>

<script>
    const inputs = document.querySelectorAll('.otp-input');
    const hidden = document.getElementById('otpHidden');
    const form   = document.getElementById('otpForm');

    inputs.forEach((input, i) => {
        input.addEventListener('input', e => {
            // Allow only digits
            e.target.value = e.target.value.replace(/\D/g, '');
            if (e.target.value && i < inputs.length - 1) inputs[i + 1].focus();
            hidden.value = Array.from(inputs).map(inp => inp.value).join('');
        });
        input.addEventListener('keydown', e => {
            if (e.key === 'Backspace' && !e.target.value && i > 0) inputs[i - 1].focus();
        });
        // Handle paste
        input.addEventListener('paste', e => {
            e.preventDefault();
            const pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
            pasted.split('').slice(0, 6).forEach((ch, j) => {
                if (inputs[j]) inputs[j].value = ch;
            });
            hidden.value = Array.from(inputs).map(inp => inp.value).join('');
            inputs[Math.min(pasted.length, 5)].focus();
        });
    });

    form.addEventListener('submit', e => {
        hidden.value = Array.from(inputs).map(inp => inp.value).join('');
        if (hidden.value.length !== 6) {
            e.preventDefault();
            alert('Please enter all 6 digits.');
        }
    });

    // Auto-focus first input
    inputs[0].focus();
</script>
</body>
</html>
