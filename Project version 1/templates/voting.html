<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Voting</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif; background: #ffffff; color: #111827;
            display: flex; flex-direction: column; align-items: center;
            padding: 60px 16px; min-height: 100vh;
        }
        .admin-corner {
            position: fixed; top: 16px; right: 16px;
            padding: 7px 14px; background: #f3f4f6;
            border: 1px solid #d1d5db; border-radius: 8px;
            font-size: 12px; font-weight: 600; color: #6b7280;
            text-decoration: none; transition: all 0.2s;
            display: inline-flex; align-items: center; gap: 6px;
        }
        .admin-corner:hover { background: #e5e7eb; color: #374151; }
        .icon-circle {
            width: 96px; height: 96px; border-radius: 50%; background: #4f46e5;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 24px;
        }
        h1 { font-size: 38px; font-weight: 700; text-align: center; margin-bottom: 8px; }
        .subtitle { font-size: 16px; color: #6b7280; text-align: center; margin-bottom: 48px; }
        .cards { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; margin-bottom: 40px; }
        .card {
            width: 200px; padding: 28px 20px; border-radius: 18px;
            border: 1px solid #e5e7eb; box-shadow: 0 8px 24px rgba(15,23,42,0.06);
            text-align: left; cursor: pointer; transition: all 0.18s;
            background: white; text-decoration: none; color: inherit; display: block;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 16px 40px rgba(15,23,42,0.12); border-color: #c7d2fe; }
        .card-icon { margin-bottom: 14px; }
        .card-icon img { width: 36px; height: 36px; }
        .card-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
        .card-text { font-size: 13px; color: #6b7280; }
        .footer { font-size: 13px; color: #9ca3af; letter-spacing: 0.5px; }
    </style>
</head>
<body>
    <a href="/admin_login" class="admin-corner">
        <img src="https://cdn-icons-png.flaticon.com/512/2889/2889676.png" style="width:14px;height:14px;" alt="admin">
        Admin Login
    </a>

    <div class="icon-circle">
        <img src="https://cdn-icons-png.flaticon.com/512/7444/7444450.png" style="width:50px;height:50px;" alt="vote">
    </div>
    <h1>Online Voting</h1>
    <p class="subtitle">Your voice matters. Cast your vote securely and easily.</p>

    <div class="cards">
        <a href="/login" class="card">
            <div class="card-icon"><img src="https://cdn-icons-png.flaticon.com/512/9428/9428917.png" alt="login"></div>
            <div class="card-title">Login</div>
            <div class="card-text">Access your account</div>
        </a>
        <a href="/register" class="card">
            <div class="card-icon"><img src="https://cdn-icons-png.flaticon.com/512/16206/16206813.png" alt="register"></div>
            <div class="card-title">Register</div>
            <div class="card-text">Create new account</div>
        </a>
        <a href="/results" class="card">
            <div class="card-icon"><img src="https://cdn-icons-png.flaticon.com/512/2065/2065092.png" alt="results"></div>
            <div class="card-title">Results</div>
            <div class="card-text">Verify vote &amp; live stats</div>
        </a>
    </div>

    <div class="footer">Secure &bull; Anonymous &bull; Transparent</div>
</body>
</html>
