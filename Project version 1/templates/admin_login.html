<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif; background: #0f172a;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 380px; width: 100%;
            background: #1e293b; border-radius: 20px; padding: 40px 32px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5); position: relative;
            border: 1px solid #334155;
        }
        .back-btn {
            position: absolute; top: 20px; left: 20px;
            color: #94a3b8; text-decoration: none; font-size: 13px; font-weight: 500;
        }
        .back-btn::before { content: "←"; margin-right: 6px; }
        .back-btn:hover { color: #e2e8f0; }
        .icon-circle {
            width: 64px; height: 64px; border-radius: 50%; background: #312e81;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px; font-size: 30px;
            border: 2px solid #4f46e5;
        }
        h1 { font-size: 24px; font-weight: 700; text-align: center; color: #f1f5f9; margin-bottom: 4px; }
        .subtitle { font-size: 14px; color: #64748b; text-align: center; margin-bottom: 28px; }
        .flash-error {
            color: #fca5a5; font-size: 13px; margin-bottom: 16px;
            background: rgba(239,68,68,0.1); padding: 10px 14px;
            border-radius: 8px; border: 1px solid rgba(239,68,68,0.3);
        }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 12px; font-weight: 600; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        input {
            width: 100%; padding: 11px 14px;
            border: 1px solid #334155; border-radius: 10px;
            font-size: 15px; background: #0f172a; color: #f1f5f9;
            font-family: 'Inter', sans-serif; transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.2); }
        input::placeholder { color: #475569; }
        .btn {
            width: 100%; padding: 13px; border: none; border-radius: 12px;
            font-size: 15px; font-weight: 700; cursor: pointer;
            background: #4f46e5; color: white; margin-top: 4px;
            transition: all 0.2s; font-family: 'Inter', sans-serif;
            letter-spacing: 0.3px;
        }
        .btn:hover { background: #4338ca; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(79,70,229,0.4); }
        .badge {
            display: inline-block; margin: 20px auto 0; text-align: center;
            width: 100%; font-size: 12px; color: #475569;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-btn">Back to Home</a>
        <div class="icon-circle"><img src="https://cdn-icons-png.flaticon.com/512/2889/2889676.png" style="width:34px;height:34px;" alt="admin"></div>
        <h1>Admin Access</h1>
        <p class="subtitle">Restricted to authorised personnel only</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash-error">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('admin_login') }}">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Doorva_Sakpal" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn" style="display:inline-flex;align-items:center;gap:8px;"><img src="https://cdn-icons-png.flaticon.com/512/1946/1946488.png" style="width:18px;height:18px;" alt="dashboard"> Access Dashboard</button>
        </form>

        <div class="badge" style="display:inline-flex;align-items:center;gap:6px;"><img src="https://cdn-icons-png.flaticon.com/512/3064/3064155.png" style="width:14px;height:14px;" alt="lock"> Admin portal — not for voters</div>
    </div>
</body>
</html>
